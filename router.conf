[satusehat]
url = https://api-satusehat.kemkes.go.id
dicom_pathsuffix = /dicom/v1/dicomWeb/studies
fhir_pathsuffix = /fhir-r4/v1
tz_name = Asia/Jakarta
ae_title = DCMROUTER
dicom_port = 11112
dcm_dir = /in/
http_port = 8080
webhook_url = https://example.com/log
webhook_user = tes
webhook_password = 123

; Mode lama: single-tenant
; Isi kredensial langsung di section [satusehat] jika hanya ada 1 faskes
; organization_id = $ORG_ID
; client_key = $CLIENT
; secret_key = $SECRET
; calling_ae_title = MODALITY_A

; Mode multi-tenant:
; Tambahkan 1 section untuk tiap faskes/tenant
; Router akan memilih tenant berdasarkan Calling AE Title dari koneksi DICOM yang masuk
[satusehat.default]
; Contoh tenant/faskes A
calling_ae_title = RSUNAND
organization_id = xxxxxxxxxx
client_key = xxxxxxxxxx
secret_key = xxxxxxxxxx

